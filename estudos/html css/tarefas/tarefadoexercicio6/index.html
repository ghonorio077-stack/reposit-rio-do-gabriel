<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <h2>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</h2>
    <ul type="circle">
        <li><abbr title="Use a tag <p>">Parágrafos</abbr></li>
        <li><abbr title="Use a tag <h1>">Títulos</abbr></li>
        <li><abbr title="Digite 'img' e de Enter">Imagens</abbr></li>
        <li><abbr title="Use a tag <abbr> depois de envelopar algo">Abreviações</abbr></li>
        <li><abbr title="Use a tag <pre> para colocar em Pré-Formatação e depois coloque a tag <code> para escrever em código">Códigos-fonte</abbr></li>
        <li><abbr title="Use a tag <ol> para mostrar uma lista com ordem de números">Listas numeradas</abbr></li>
        <li><abbr title="Use a tag <ul> para mostrar listas com símbolos ao invés de números, sem qualquer tipo de ordem">Listas com demarcadores</abbr></li>
        <p> É isso aí!</p>
    </ul>
</body>
</html>
